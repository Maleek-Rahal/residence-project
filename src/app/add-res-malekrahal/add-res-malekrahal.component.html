<h2>Ajouter une Résidence</h2>
<form (ngSubmit)="addResidence()">
  <div class="mb-3">
    <label>Nom</label>
    <input type="text" [(ngModel)]="residence.name" name="name" class="form-control" required>
  </div>
  <div class="mb-3">
    <label>Adresse</label>
    <input type="text" [(ngModel)]="residence.address" name="address" class="form-control" required>
  </div>
  <div class="mb-3">
    <label>Image</label>
    <input type="text" [(ngModel)]="residence.image" name="image" class="form-control">
  </div>
  <div class="mb-3">
    <label>Status</label>
    <select [(ngModel)]="residence.status" name="status" class="form-select">
      <option>Disponible</option>
      <option>Non disponible</option>
    </select>
  </div>
  <button class="btn btn-success" type="submit">Ajouter</button>
</form>
